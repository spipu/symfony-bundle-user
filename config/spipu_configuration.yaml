spipu_configuration:
    user.security.lock_enabled:
        type:     boolean
        required: true
        default:  "1"

    user.security.lock_max_attempts:
        type:     integer
        required: true
        default:  "10"
        unit:     "attempt(s)"

    user.security.token_expiration:
        type:     integer
        required: true
        default:  "12"
        unit:     "hour(s)"

    user.security.password_min_length:
        type:     integer
        required: true
        default:  "10"
        unit:     "character(s)"
